<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>ユーザー登録</h1>
<form th:action="@{/exam04/result}"
      th:object="${userForm}"
      method="post">
    <p th:errors="*{name}" style="color: red"></p>
    名前: <input type="text" th:field="*{name}"><br>
    <p th:errors="*{age}" style="color: red"></p>
    年齢: <input type="text" th:field="*{age}"><br>
    <p th:errors="*{comment}" style="color: red"></p>
    コメント: <br>
    <textarea cols="30" rows="4" th:field="*{comment}"></textarea><br>
    <button>登録</button>
</form>
</body>
</html>
